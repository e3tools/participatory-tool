<div class="filter-box">
  <div class="visible-xs flex justify-flex-end">
    <span class="remove-filter"> {{ __("Remove") }} </span>
  </div>
  <div class="list_filter row">
    <div
      class="fieldname-select-area col-sm-4 ui-front form-group d-none"
    ></div>
    <div class="col-sm-5 form-group">
      <select class="condition form-control input-xs">
        {% for condition in conditions %}
        <option value="{{condition[0]}}">{{ condition[1] }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-sm-6 form-group">
      <div class="filter-field"></div>
      <div class="text-muted small filter-description"></div>
    </div>
    <!--Hide errors field as instead of validation level errors, we will have one error message for all validations-->
    <div class="col-sm-1 form-group d-none">
      <div class="text-muted small">
        <input class="error-message form-control input-xs" type="text" />
      </div>
    </div>
    <div class="remove-filter col-sm-1 text-center hidden-xs">
      <svg class="icon icon-sm">
        <use href="#icon-close" class="close"></use>
      </svg>
    </div>
  </div>
</div>
